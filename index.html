<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SourceMind AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #18181f;
      --border: #ffffff0f;
      --border2: #ffffff18;
      --accent: #c8f045;
      --accent-dim: #c8f04520;
      --text: #f0f0f0;
      --text2: #888;
      --text3: #444;
      --user-bubble: #1a1a24;
      --ai-bubble: #13131a;
      --danger: #ff4d4d;
      --yt: #ff4444;
      --yt-dim: #ff444420;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace
    }

    .app {
      display: flex;
      height: 100vh
    }

    /* sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border)
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.8)
      }
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .new-chat-btn:hover {
      opacity: .88
    }

    .new-chat-btn:active {
      transform: scale(.98)
    }

    .sessions-label {
      padding: 16px 20px 8px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text3);
      text-transform: uppercase
    }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 16px
    }

    .sessions-list::-webkit-scrollbar {
      width: 3px
    }

    .sessions-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background .12s;
      border: 1px solid transparent
    }

    .session-item:hover {
      background: var(--bg3)
    }

    .session-item.active {
      background: var(--accent-dim);
      border-color: #c8f04530
    }

    .session-item.yt-session.active {
      background: var(--yt-dim);
      border-color: #ff444430
    }

    .session-title {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Syne', sans-serif;
      font-weight: 500
    }

    .session-date {
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .type-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: .3px
    }

    .type-badge.pdf {
      background: var(--accent-dim);
      color: var(--accent)
    }

    .type-badge.yt {
      background: var(--yt-dim);
      color: var(--yt)
    }

    .sessions-empty {
      padding: 20px 12px;
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      line-height: 1.6
    }

    /* main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* welcome */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      animation: fadein .4s ease
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .welcome-title {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-align: center
    }

    .welcome-title span {
      color: var(--accent)
    }

    .welcome-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.6
    }

    /* toggle */
    .source-toggle {
      display: flex;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 480px
    }

    .toggle-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      background: transparent;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .toggle-btn.active-pdf {
      background: var(--accent);
      color: #0a0a0f
    }

    .toggle-btn.active-yt {
      background: var(--yt);
      color: #fff
    }

    /* upload */
    .upload-zone {
      width: 100%;
      max-width: 480px;
      border: 1.5px dashed var(--border2);
      border-radius: 14px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--bg2);
      position: relative
    }

    .upload-zone:hover,
    .upload-zone.drag {
      border-color: var(--accent);
      background: var(--accent-dim)
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: .6
    }

    .upload-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6
    }

    .upload-text strong {
      color: var(--accent);
      font-weight: 400
    }

    #file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer
    }

    .yt-zone {
      width: 100%;
      max-width: 480px;
      display: none
    }

    .yt-input {
      width: 100%;
      padding: 16px;
      background: var(--bg2);
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color .2s
    }

    .yt-input:focus {
      border-color: #ff444460
    }

    .yt-input::placeholder {
      color: var(--text3)
    }

    .yt-hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
      text-align: center
    }

    .file-list {
      width: 100%;
      max-width: 480px;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2)
    }

    .file-chip-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .file-chip-size {
      color: var(--text3);
      flex-shrink: 0
    }

    .session-title-input {
      width: 100%;
      max-width: 480px;
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color .2s
    }

    .session-title-input:focus {
      border-color: #c8f04560
    }

    .session-title-input::placeholder {
      color: var(--text3)
    }

    .start-btn {
      margin-top: 14px;
      padding: 12px 32px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .start-btn.yt-mode {
      background: var(--yt);
      color: #fff
    }

    .start-btn:hover {
      opacity: .88
    }

    .start-btn:active {
      transform: scale(.98)
    }

    .start-btn:disabled {
      opacity: .35;
      cursor: not-allowed
    }

    .uploading-bar {
      width: 100%;
      max-width: 480px;
      margin-top: 10px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none
    }

    .uploading-bar.show {
      display: block
    }

    .uploading-fill {
      height: 100%;
      width: 30%;
      background: var(--accent);
      border-radius: 2px;
      animation: slide 1s ease-in-out infinite alternate
    }

    .uploading-fill.yt {
      background: var(--yt)
    }

    @keyframes slide {
      from {
        margin-left: 0
      }

      to {
        margin-left: 70%
      }
    }

    /* chat */
    .chat-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadein .3s ease
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2)
    }

    .chat-header-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .chat-docs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .doc-tag {
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-dim);
      border: 1px solid #c8f04530;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: .3px
    }

    .doc-tag.yt {
      background: var(--yt-dim);
      border-color: #ff444430;
      color: var(--yt)
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .messages::-webkit-scrollbar {
      width: 3px
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end
    }

    .msg.assistant {
      align-self: flex-start;
      align-items: flex-start
    }

    .msg-role {
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 5px;
      padding: 0 4px
    }

    .msg.user .msg-role {
      color: #c8f04580
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word
    }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border2);
      border-bottom-right-radius: 3px
    }

    .msg.assistant .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      align-items: center
    }

    .typing span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: blink 1.2s ease-in-out infinite
    }

    .typing span:nth-child(2) {
      animation-delay: .2s
    }

    .typing span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .2
      }

      40% {
        opacity: 1
      }
    }

    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      gap: 10px;
      align-items: flex-end
    }

    .input-wrap {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 4px;
      transition: border-color .2s
    }

    .input-wrap:focus-within {
      border-color: #c8f04550
    }

    .input-wrap.yt-chat:focus-within {
      border-color: #ff444450
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      max-height: 120px;
      line-height: 1.5
    }

    #msg-input::placeholder {
      color: var(--text3)
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s
    }

    .send-btn.yt-send {
      background: var(--yt)
    }

    .send-btn:hover {
      opacity: .85
    }

    .send-btn:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .send-btn svg {
      width: 16px;
      height: 16px
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      display: none
    }

    .toast.show {
      display: block;
      animation: fadein .2s ease
    }

    .toast.error {
      border-color: #ff4d4d50;
      color: var(--danger)
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-dot"></div>SourceMind AI
        </div>
        <button class="new-chat-btn" onclick="showWelcome()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Chat
        </button>
      </div>
      <div class="sessions-label">Recent</div>
      <div class="sessions-list" id="sessions-list">
        <div class="sessions-empty">No chats yet.<br />Start a new one above.</div>
      </div>
    </div>

    <div class="main">

      <div class="welcome" id="welcome-screen">
        <div class="welcome-title">Ask your <span>sources</span></div>
        <div class="welcome-sub">Chat with PDFs or YouTube videos using hybrid RAG search.</div>

        <div class="source-toggle">
          <button class="toggle-btn active-pdf" id="toggle-pdf" onclick="switchMode('pdf')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            PDF Documents
          </button>
          <button class="toggle-btn" id="toggle-yt" onclick="switchMode('youtube')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            YouTube Video
          </button>
        </div>

        <div class="upload-zone" id="upload-zone">
          <input type="file" id="file-input" multiple accept=".pdf" />
          <div class="upload-icon">⌗</div>
          <div class="upload-text">
            Drop PDFs here or <strong>click to browse</strong><br />
            <span style="font-size:11px;color:var(--text3)">Multiple files supported</span>
          </div>
        </div>

        <div class="yt-zone" id="yt-zone">
          <input class="yt-input" id="yt-url" placeholder="Paste YouTube URL here..." oninput="updateStartBtn()" />
          <div class="yt-hint">e.g. https://youtube.com/watch?v=xxxxx · one video per session</div>
        </div>

        <div class="file-list" id="file-list"></div>
        <div class="uploading-bar" id="uploading-bar">
          <div class="uploading-fill" id="uploading-fill"></div>
        </div>

        <input class="session-title-input" id="session-title" placeholder="Give this chat a title..." maxlength="60"
          oninput="updateStartBtn()" />

        <button class="start-btn" id="start-btn" onclick="startSession()" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
          <span id="start-label">Upload & Start Chat</span>
        </button>
      </div>

      <div class="chat-screen" id="chat-screen" style="display:none">
        <div class="chat-header">
          <div class="chat-header-title" id="chat-title">Chat</div>
          <div class="chat-docs" id="chat-docs"></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-bar">
          <div class="input-wrap" id="input-wrap">
            <textarea id="msg-input" rows="1" placeholder="Ask anything about your source..."></textarea>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
  const API = 'https://sourcemindai.onrender.com';

  // ✅ NEW — persistent user identity via localStorage
  const USER_ID = localStorage.getItem('sm_user_id') || (() => {
    const id = crypto.randomUUID();
    localStorage.setItem('sm_user_id', id);
    return id;
  })();

  let currentSession = null;
  let selectedFiles = [];
  let currentMode = 'pdf';

  function switchMode(mode) {
    currentMode = mode;
    const isPdf = mode === 'pdf';
    document.getElementById('toggle-pdf').className = 'toggle-btn' + (isPdf ? ' active-pdf' : '');
    document.getElementById('toggle-yt').className = 'toggle-btn' + (!isPdf ? ' active-yt' : '');
    document.getElementById('upload-zone').style.display = isPdf ? 'block' : 'none';
    document.getElementById('yt-zone').style.display = isPdf ? 'none' : 'block';
    document.getElementById('file-list').innerHTML = '';
    document.getElementById('yt-url').value = '';
    selectedFiles = [];
    const btn = document.getElementById('start-btn');
    const fill = document.getElementById('uploading-fill');
    if (isPdf) {
      btn.classList.remove('yt-mode');
      fill.classList.remove('yt');
      document.getElementById('start-label').textContent = 'Upload & Start Chat';
    } else {
      btn.classList.add('yt-mode');
      fill.classList.add('yt');
      document.getElementById('start-label').textContent = 'Index & Start Chat';
    }
    updateStartBtn();
  }

  document.getElementById('file-input').addEventListener('change', e => {
    selectedFiles = Array.from(e.target.files);
    renderFileList();
  });

  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.pdf'));
    renderFileList();
  });

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    selectedFiles.forEach(f => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c8f045" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="file-chip-name">${f.name}</span>
        <span class="file-chip-size">${(f.size / 1024).toFixed(0)} KB</span>
      `;
      list.appendChild(chip);
    });
    updateStartBtn();
  }

  function updateStartBtn() {
    const title = document.getElementById('session-title').value.trim();
    let sourceReady = false;
    if (currentMode === 'pdf') {
      sourceReady = selectedFiles.length > 0;
    } else {
      const url = document.getElementById('yt-url').value.trim();
      sourceReady = url.includes('youtube') || url.includes('youtu.be');
    }
    document.getElementById('start-btn').disabled = !sourceReady || !title;
  }

  async function startSession() {
    const title = document.getElementById('session-title').value.trim();
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    document.getElementById('start-label').textContent = 'Processing...';
    document.getElementById('uploading-bar').classList.add('show');

    try {
      let docNames = [];

      if (currentMode === 'pdf') {
        const formData = new FormData();
        selectedFiles.forEach(f => formData.append('files', f));
        formData.append('user_id', USER_ID);  // ✅ NEW
        const upRes = await fetch(`${API}/upload_pdf`, { method: 'POST', body: formData });
        if (!upRes.ok) throw new Error('Upload failed');
        docNames = selectedFiles.map(f => f.name);
      } else {
        const url = document.getElementById('yt-url').value.trim();
        const ytRes = await fetch(`${API}/upload_youtube_link`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, user_id: USER_ID })  // ✅ NEW
        });
        if (!ytRes.ok) throw new Error('YouTube indexing failed');
        const ytData = await ytRes.json();
        docNames = [ytData.doc_name];
      }

      const sessRes = await fetch(`${API}/session/new`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doc_names: docNames, title, user_id: USER_ID })  // ✅ NEW
      });
      const sessData = await sessRes.json();
      const sessionId = sessData.session_id || sessData;

      currentSession = { id: sessionId, title, doc_names: docNames, type: currentMode };
      await loadSessions();
      openChat(currentSession, []);

    } catch (e) {
      showToast(e.message, true);
      btn.disabled = false;
      document.getElementById('start-label').textContent = currentMode === 'pdf' ? 'Upload & Start Chat' : 'Index & Start Chat';
    } finally {
      document.getElementById('uploading-bar').classList.remove('show');
    }
  }

  async function selectSession(session) {
    currentSession = session;
    try {
      const res = await fetch(`${API}/session/${session.id}/messages`);
      const messages = await res.json();
      openChat(session, messages);
    } catch (e) {
      showToast('Could not load chat', true);
    }
  }

  function openChat(session, messages) {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';

    const isYt = session.type === 'youtube';
    document.getElementById('chat-title').textContent = session.title;

    const docsEl = document.getElementById('chat-docs');
    docsEl.innerHTML = (session.doc_names || []).map(d =>
      `<span class="doc-tag ${isYt ? 'yt' : ''}">${isYt ? '▶ ' : ''}${d}</span>`
    ).join('');

    const sendBtn = document.getElementById('send-btn');
    const inputWrap = document.getElementById('input-wrap');
    sendBtn.classList.toggle('yt-send', isYt);
    inputWrap.classList.toggle('yt-chat', isYt);

    const msgsEl = document.getElementById('messages');
    msgsEl.innerHTML = '';
    (messages || []).forEach(m => appendMessage(m.role, m.content));
    msgsEl.scrollTop = msgsEl.scrollHeight;

    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === session.id);
    });

    document.getElementById('msg-input').focus();
  }

  function showWelcome() {
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('welcome-screen').style.display = 'flex';
    selectedFiles = [];
    document.getElementById('file-list').innerHTML = '';
    document.getElementById('session-title').value = '';
    document.getElementById('file-input').value = '';
    document.getElementById('yt-url').value = '';
    document.getElementById('start-btn').disabled = true;
    document.getElementById('start-btn').classList.remove('yt-mode');
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    currentSession = null;
    switchMode('pdf');
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentSession) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', text);
    const typingEl = appendTyping();

    const endpoint = currentSession.type === 'youtube' ? '/chat_youtube' : '/chat_pdfs';

    try {
      const res = await fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: currentSession.id,
          query_text: text,
          doc_names: currentSession.doc_names,
          user_id: USER_ID  // ✅ NEW
        })
      });
      const data = await res.json();
      typingEl.remove();
      appendMessage('assistant', data.reply || data);
    } catch (e) {
      typingEl.remove();
      appendMessage('assistant', '⚠ Could not get a response. Please try again.');
      showToast('Request failed', true);
    } finally {
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function appendMessage(role, content) {
    const msgsEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-role">${role === 'user' ? 'You' : 'SourceMind'}</div>
      <div class="msg-bubble">${escapeHtml(content)}</div>
    `;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return div;
  }

  function appendTyping() {
    const msgsEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="msg-role">SourceMind</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return div;
  }

  function escapeHtml(t) {
    return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function loadSessions() {
    try {
      const res = await fetch(`${API}/sessions?user_id=${USER_ID}`);  // ✅ NEW
      const sessions = await res.json();
      const list = document.getElementById('sessions-list');

      if (!sessions.length) {
        list.innerHTML = '<div class="sessions-empty">No chats yet.<br/>Start a new one above.</div>';
        return;
      }

      list.innerHTML = '';
      sessions.forEach(s => {
        const isYt = (s.doc_names || []).every(d => !d.includes('.'));
        s.type = isYt ? 'youtube' : 'pdf';
        const el = document.createElement('div');
        el.className = 'session-item' + (isYt ? ' yt-session' : '');
        el.dataset.id = s.id;
        const date = new Date(s.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        el.innerHTML = `
          <div class="session-title">${escapeHtml(s.title)}</div>
          <div class="session-date">
            <span class="type-badge ${isYt ? 'yt' : 'pdf'}">${isYt ? 'YT' : 'PDF'}</span>
            ${date} · ${(s.doc_names || []).length} source${(s.doc_names || []).length !== 1 ? 's' : ''}
          </div>
        `;
        el.onclick = () => selectSession(s);
        if (currentSession && s.id === currentSession.id) el.classList.add('active');
        list.appendChild(el);
      });
    } catch (e) {
      console.error('Could not load sessions', e);
    }
  }

  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  loadSessions();
</script>
</body>

</html>
